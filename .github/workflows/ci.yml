name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format
        run: ruff format --check src tests

      - name: ty
        run: ty check

      - name: Pytest with coverage
        run: pytest --cov=semsql --cov-report=term-missing --cov-fail-under=100

  fastapi-extra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install with fastapi extra only
        run: pip install -e ".[fastapi]" pytest httpx

      - name: Verify fastapi subpackage imports
        run: python -c "from semsql.fastapi import negotiate_onto_response; print('ok')"
